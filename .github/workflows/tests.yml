name: Tests

on:
  push:
    branches: [master, 'feature/**']
  pull_request:
    branches: [master]

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5']
        laravel: ['11.*', '12.*', '13.*']
        exclude:
          - php: '8.5'
            laravel: '11.*'
          - php: '8.2'
            laravel: '13.*'

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring
          coverage: none

      - name: Install dependencies
        run: |
          composer require "illuminate/auth:${{ matrix.laravel }}" "illuminate/support:${{ matrix.laravel }}" --no-update
          composer install --no-interaction --prefer-dist

      - name: Run tests
        run: vendor/bin/pest
        env:
          CACHE_DRIVER: array
